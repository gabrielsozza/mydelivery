# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# APLICAÇÃO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.application.name=mydelivery-api
# PORT dinâmico: Railway/Heroku/Render injetam via env. Local sem PORT usa 8080.
server.port=${PORT:8080}
# Carrega .env (formato KEY=VALUE) da raiz do projeto se existir — opcional.
# Em produção (Railway) usa env vars diretas; em dev local, .env é mais cômodo.
spring.config.import=optional:file:./.env[.properties]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BANCO DE DADOS MYSQL
# Em produção: definir DB_URL, DB_USERNAME, DB_PASSWORD nas env vars do Railway.
# Em dev local: usa MySQL local (localhost:3306).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mydelivery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JPA / HIBERNATE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JWT
# Em produção: definir JWT_SECRET nas env vars (Base64, mínimo 256 bits).
# Gerar nova chave: openssl rand -base64 64
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
jwt.secret=${JWT_SECRET:dev-secret-only-not-for-production-replace-via-env-XXXXXXXXXXXXXXXXXXXXXXXXXXX==}
# 8 horas de validade do token (antes era 1h — quebrava sessões longas)
jwt.expiration=${JWT_EXPIRATION:28800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# E-MAIL (Gmail SMTP)
# Em produção: definir MAIL_USERNAME e MAIL_PASSWORD (App Password do Gmail).
# https://myaccount.google.com/apppasswords
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# UPLOAD DE ARQUIVOS (fotos dos produtos)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.servlet.multipart.enabled=true
# 10MB por arquivo (limite do suporte). 35MB de request — 3 arquivos × 10MB + headers/texto.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SUPORTE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Pasta onde os anexos de suporte são salvos (caminho relativo ao working dir do app).
mydelivery.suporte.uploads-dir=./uploads/suporte
# Throttle anti-flood: segundos mínimos entre 2 mensagens do mesmo restaurante.
mydelivery.suporte.throttle-segundos=3
# Máximo de anexos por mensagem.
mydelivery.suporte.max-anexos=3

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CORS (permite o frontend chamar a API)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CORS: separa origens por vírgula. Em prod definir CORS_ORIGINS com domínio do frontend.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,file://localhost,file://localhost:5500,null}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CONFIGURAÇÕES DO MYDELIVERY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Trial: 30 dias úteis + 2 dias extras de configuração = 32 dias.
app.trial.dias=32
# Valor do plano mensal (fonte da verdade está em Plano.java; aqui só pra compatibilidade).
app.mensalidade.valor=49.90
# Inadimplência: dias após vencimento em que cada fase começa.
app.assinatura.alerta-dias=0
app.assinatura.restricao-dias=5
app.assinatura.bloqueio-dias=10
# Avisar restaurante quando faltarem N dias pro trial acabar (modal automático).
app.assinatura.aviso-trial-dias=5
# URL pública do frontend (usado em links de email, redirects). Em prod aponta pro domínio.
app.url=${APP_URL:http://localhost:5500}
# Base URL do backend (usada pra montar URLs públicas de uploads — logo/capa do restaurante).
app.api.base-url=${API_BASE_URL:http://localhost:8080}
# Pasta onde uploads do restaurante (logo, capa) ficam salvos. Servida em /uploads/**.
mydelivery.uploads.dir=./uploads

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CLOUDINARY (storage de imagens de produtos)
# Configurar via variáveis de ambiente — NUNCA commitar credenciais.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
mydelivery.cloudinary.api-key=${CLOUDINARY_API_KEY:}
mydelivery.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
# Pasta lógica dentro do Cloudinary (organiza por tenant). Opcional.
mydelivery.cloudinary.folder=mydelivery/produtos
app.email.remetente=${MAIL_FROM:noreply@mydelivery.app}
app.email.nome-remetente=${MAIL_FROM_NAME:MyDelivery}

# Scheduler
spring.task.scheduling.enabled=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEVTOOLS — desliga o LiveReload server (porta 35729) que estava disparando
# reloads automáticos no navegador (~10s/50s) sempre que o classpath mudava.
# Restart automático continua ativo (útil em dev); só o reload do front é desligado.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.devtools.livereload.enabled=false

spring.jackson.deserialization.fail-on-unknown-properties=false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MERCADO PAGO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Endpoint base — só altere pra testes.
mydelivery.mercadopago.base-url=https://api.mercadopago.com
# Timeout das chamadas HTTP em ms.
mydelivery.mercadopago.timeout-ms=15000
# URL pública onde o MP vai bater pra notificar mudanças de status.
# Em dev local, use ngrok: https://<seu-tunel>.ngrok-free.app/api/webhooks/mercadopago
mydelivery.mercadopago.webhook-url=${MP_WEBHOOK_URL:http://localhost:8080/api/webhooks/mercadopago}
# Expiração do QR Code PIX em minutos.
mydelivery.mercadopago.pix-expiracao-min=30

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# EVOLUTION API (WhatsApp)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# URL do Evolution. Em dev local: http://localhost:8081. Em prod: instância hospedada.
mydelivery.evolution.base-url=${EVOLUTION_BASE_URL:http://localhost:8081}
# Chave global da Evolution (definida em AUTHENTICATION_API_KEY no docker-compose dela).
mydelivery.evolution.api-key=${EVOLUTION_API_KEY:}
# URL pública pra Evolution chamar nosso webhook. Em dev: ngrok (https://xxx.ngrok-free.app).
mydelivery.evolution.webhook-base-url=${EVOLUTION_WEBHOOK_BASE_URL:http://localhost:8080}
mydelivery.evolution.timeout-ms=15000
# Bot: throttle anti-spam (1 resposta automática a cada N segundos pro mesmo número).
mydelivery.evolution.bot.throttle-segundos=30
# Modo silêncio quando cliente pede "atendente": bot fica quieto por N minutos pra aquele número.
mydelivery.evolution.bot.silencio-minutos=30

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# META WHATSAPP CLOUD API (oficial, substitui Evolution/Baileys)
# Docs: https://developers.facebook.com/docs/whatsapp/cloud-api
# Liga essa integração quando WHATSAPP_CLOUD_ENABLED=true e credenciais preenchidas.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.whatsapp.cloud.enabled=${WHATSAPP_CLOUD_ENABLED:false}
mydelivery.whatsapp.cloud.api-version=${WHATSAPP_API_VERSION:v21.0}
mydelivery.whatsapp.cloud.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
mydelivery.whatsapp.cloud.business-account-id=${WHATSAPP_BUSINESS_ACCOUNT_ID:}
mydelivery.whatsapp.cloud.access-token=${WHATSAPP_ACCESS_TOKEN:}
mydelivery.whatsapp.cloud.app-secret=${WHATSAPP_APP_SECRET:}
mydelivery.whatsapp.cloud.verify-token=${WHATSAPP_VERIFY_TOKEN:}

