# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# APLICAÇÃO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.application.name=mydelivery-api
server.port=8080
# Carrega .env (formato KEY=VALUE) da raiz do projeto se existir — opcional.
# Permite definir CLOUDINARY_* sem exportar env vars no shell.
spring.config.import=optional:file:./.env[.properties]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BANCO DE DADOS MYSQL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.datasource.url=jdbc:mysql://localhost:3306/mydelivery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Gabriel2001.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JPA / HIBERNATE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
