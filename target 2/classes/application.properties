# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# APLICAÇÃO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.application.name=mydelivery-api
# PORT dinâmico: Railway/Heroku/Render injetam via env. Local sem PORT usa 8080.
server.port=${PORT:8080}
# Carrega .env (formato KEY=VALUE) da raiz do projeto se existir — opcional.
# Em produção (Railway) usa env vars diretas; em dev local, .env é mais cômodo.
spring.config.import=optional:file:./.env[.properties]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LOG PATTERN — MDC (correlationId + instância)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Jul/2026 v2: cada log carrega cid= (correlationId da request HTTP) e
# inst= (instância WhatsApp quando aplicável). Permite:
#   railway logs | grep 'cid=abc12345'    # tudo daquela request
#   railway logs | grep 'inst=mydelivery-rest-42'   # tudo daquela loja
# Sem MDC os logs viravam soup impossível de correlacionar.
logging.pattern.level=%5p [cid=%X{cid:-} inst=%X{inst:-}]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# BANCO DE DADOS MYSQL
# Em produção: definir DB_URL, DB_USERNAME, DB_PASSWORD nas env vars do Railway.
# Em dev local: usa MySQL local (localhost:3306).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mydelivery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP — pool de conexões ──
# Default = 10. Em pico domingo à noite (vários restaurantes ativos com
# polling 30s + webhooks MP/iFood + jobs internos), 10 esgotava e
# requests novos esperavam até 30s (default), travando o frontend que
# mostrava tela em branco.
#
# 25 conexões = folga pra ~30 restaurantes ativos simultaneamente.
# connection-timeout=5s: falha rápido em vez de travar a UI por 30s.
# leak-detection: avisa em log se alguém esquecer conexão aberta >30s.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:25}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JPA / HIBERNATE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.jpa.hibernate.ddl-auto=update
# Flyway: gerencia schema via migrations versionadas em db/migration/.
# baseline-on-migrate=true: como o banco em prod ja existe com schema
# criado pelo Hibernate ddl-auto, fazemos baseline da versao 1 (vazia) e
# todas as proximas mudancas vao como V2, V3... Eventualmente migramos
# ddl-auto pra "validate" e o Hibernate so confere se schema bate.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JWT
# Em produção: definir JWT_SECRET nas env vars (Base64, mínimo 256 bits).
# Gerar nova chave: openssl rand -base64 64
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# JWT secret — SEM fallback. Se a env JWT_SECRET nao estiver setada, a app
# nao sobe (Spring falha o startup). Isso impede o pior cenario: prod subir
# acidentalmente com chave "dev-secret" e qualquer um forjar tokens.
# Em dev local: defina JWT_SECRET no .env (ver .env.example).
jwt.secret=${JWT_SECRET}
# 8 horas de validade do token (antes era 1h — quebrava sessões longas)
jwt.expiration=${JWT_EXPIRATION:28800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# E-MAIL (Gmail SMTP)
# Em produção: definir MAIL_USERNAME e MAIL_PASSWORD (App Password do Gmail).
# https://myaccount.google.com/apppasswords
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# UPLOAD DE ARQUIVOS (fotos dos produtos)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.servlet.multipart.enabled=true
# 10MB por arquivo (limite do suporte). 35MB de request — 3 arquivos × 10MB + headers/texto.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=35MB

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SUPORTE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Pasta onde os anexos de suporte são salvos (caminho relativo ao working dir do app).
mydelivery.suporte.uploads-dir=./uploads/suporte
# Throttle anti-flood: segundos mínimos entre 2 mensagens do mesmo restaurante.
mydelivery.suporte.throttle-segundos=3
# Máximo de anexos por mensagem.
mydelivery.suporte.max-anexos=3

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CORS (permite o frontend chamar a API)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CORS: separa origens por vírgula. Em prod definir CORS_ORIGINS com domínio do frontend.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,file://localhost,file://localhost:5500,null}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CONFIGURAÇÕES DO MYDELIVERY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Trial: 30 dias úteis + 2 dias extras de configuração = 32 dias.
app.trial.dias=32
# Valor do plano mensal (fonte da verdade está em Plano.java; aqui só pra compatibilidade).
app.mensalidade.valor=49.90
# Inadimplência: dias após vencimento em que cada fase começa.
app.assinatura.alerta-dias=0
app.assinatura.restricao-dias=5
app.assinatura.bloqueio-dias=10
# Avisar restaurante quando faltarem N dias pro trial acabar (modal automático).
app.assinatura.aviso-trial-dias=5
# URL pública do frontend (usado em links de email, redirects). Em prod aponta pro domínio.
app.url=${APP_URL:http://localhost:5500}
# Base URL do backend (usada pra montar URLs públicas de uploads — logo/capa do restaurante).
app.api.base-url=${API_BASE_URL:http://localhost:8080}
# Pasta onde uploads do restaurante (logo, capa) ficam salvos. Servida em /uploads/**.
mydelivery.uploads.dir=./uploads

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CLOUDINARY (storage de imagens de produtos)
# Configurar via variáveis de ambiente — NUNCA commitar credenciais.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
mydelivery.cloudinary.api-key=${CLOUDINARY_API_KEY:}
mydelivery.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
# Pasta lógica dentro do Cloudinary (organiza por tenant). Opcional.
mydelivery.cloudinary.folder=mydelivery/produtos
app.email.remetente=${MAIL_FROM:noreply@mydelivery.app}
app.email.nome-remetente=${MAIL_FROM_NAME:MyDelivery}

# Secret pra endpoints internos chamados pelo admin-mydelivery-api.
# DEVE ser configurado no Railway (env ADMIN_INTERNAL_SECRET) — string longa aleatória.
mydelivery.admin.internal-secret=${ADMIN_INTERNAL_SECRET:}

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OCR — Importação de cardápio via IMAGEM (.jpg/.png/.webp)
# Usa OCR.space (https://ocr.space/ocrapi). Chave pública "helloworld" funciona
# pra arquivos até 1MB. Pra produção (até 5MB e maior precisão), registre conta
# gratuita em https://ocr.space/ocrapi e defina OCR_API_KEY no Railway
# (25k requests/mês grátis).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.ocr.api-key=${OCR_API_KEY:helloworld}
mydelivery.ocr.timeout-ms=60000

# Resend (email via HTTP API — Gmail SMTP bloqueado em cloud IPs)
# Pega API key em https://resend.com (gratis até 3000 emails/mês)
# Sem chave = cai pra SMTP (fallback)
mydelivery.resend.api-key=${RESEND_API_KEY:}

# Scheduler
spring.task.scheduling.enabled=true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# DEVTOOLS — desliga o LiveReload server (porta 35729) que estava disparando
# reloads automáticos no navegador (~10s/50s) sempre que o classpath mudava.
# Restart automático continua ativo (útil em dev); só o reload do front é desligado.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
spring.devtools.livereload.enabled=false

spring.jackson.deserialization.fail-on-unknown-properties=false

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# MERCADO PAGO
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Endpoint base — só altere pra testes.
mydelivery.mercadopago.base-url=https://api.mercadopago.com
# Timeout das chamadas HTTP em ms.
mydelivery.mercadopago.timeout-ms=15000
# URL pública onde o MP vai bater pra notificar mudanças de status.
# Em dev local, use ngrok: https://<seu-tunel>.ngrok-free.app/api/webhooks/mercadopago
mydelivery.mercadopago.webhook-url=${MP_WEBHOOK_URL:http://localhost:8080/api/webhooks/mercadopago}
# Expiração do QR Code PIX em minutos.
mydelivery.mercadopago.pix-expiracao-min=30

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# EVOLUTION API (WhatsApp)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# URL do Evolution. Em dev local: http://localhost:8081. Em prod: instância hospedada.
mydelivery.evolution.base-url=${EVOLUTION_BASE_URL:http://localhost:8081}
# Chave global da Evolution (definida em AUTHENTICATION_API_KEY no docker-compose dela).
mydelivery.evolution.api-key=${EVOLUTION_API_KEY:}
# URL pública pra Evolution chamar nosso webhook. Em dev: ngrok (https://xxx.ngrok-free.app).
mydelivery.evolution.webhook-base-url=${EVOLUTION_WEBHOOK_BASE_URL:http://localhost:8080}
mydelivery.evolution.timeout-ms=15000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# iFOOD ORDER API
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Documentação: https://developer.ifood.com.br
# client_id / secret criados no portal Developer ao registrar o app MyDelivery.
mydelivery.ifood.client-id=${IFOOD_CLIENT_ID:}
mydelivery.ifood.client-secret=${IFOOD_CLIENT_SECRET:}
mydelivery.ifood.base-url=${IFOOD_BASE_URL:https://merchant-api.ifood.com.br}
# Liga/desliga o polling de eventos. Mantenha false até a homologação ser aprovada.
mydelivery.ifood.polling-ativo=${IFOOD_POLLING_ATIVO:false}
mydelivery.ifood.polling-intervalo-segundos=30
mydelivery.ifood.timeout-ms=15000

# Bot: throttle anti-spam (1 resposta automática a cada N segundos pro mesmo número).
# 3s = anti-flood (impede 100 msgs/seg) sem percepção de delay pra usuário humano.
# Antes era 30s, que travava a conversa real e parecia bot quebrado.
mydelivery.evolution.bot.throttle-segundos=3
# Modo silêncio quando cliente pede "atendente": janela deslizante — cada msg do cliente
# renova o timer por mais N min. Se cliente+atendente ficam N min sem trocar msg, bot volta.
mydelivery.evolution.bot.silencio-minutos=5
# Proxy residencial sticky (Proxy-Seller) — injetado em cada criação de instância
# Quando host vazio, proxy é desabilitado pras instâncias novas.
mydelivery.evolution.proxy.host=${EVOLUTION_PROXY_HOST:}
mydelivery.evolution.proxy.port=${EVOLUTION_PROXY_PORT:0}
mydelivery.evolution.proxy.protocol=${EVOLUTION_PROXY_PROTOCOL:http}
mydelivery.evolution.proxy.username=${EVOLUTION_PROXY_USERNAME:}
mydelivery.evolution.proxy.password=${EVOLUTION_PROXY_PASSWORD:}

# ════════════════════════════════════════════════════════════════════
# Meta Conversions API (server-side tracking)
# Roda em paralelo ao Pixel JS — recupera ~30-40% de eventos perdidos
# pelo navegador (iOS 14+, AdBlock, Safari ITP).
# Token: Gerenciador de Eventos → Configurações → API de Conversões → Gerar token.
# Deixe META_CAPI_ATIVO=false enquanto não tiver token gerado.
# ════════════════════════════════════════════════════════════════════
mydelivery.meta-capi.pixel-id=${META_PIXEL_ID:1503747827953722}
mydelivery.meta-capi.access-token=${META_CAPI_ACCESS_TOKEN:}
mydelivery.meta-capi.ativo=${META_CAPI_ATIVO:false}
mydelivery.meta-capi.test-event-code=${META_CAPI_TEST_EVENT:}
mydelivery.meta-capi.timeout-ms=10000

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PROGRAMA DE AFILIADOS — webhook outbound pra myafiliados-api
# Se base-url ou secret estiver vazio, integração fica desligada (no-op).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
mydelivery.afiliados.base-url=${MYAFILIADOS_BASE_URL:}
mydelivery.afiliados.webhook-secret=${MYAFILIADOS_WEBHOOK_SECRET:}

